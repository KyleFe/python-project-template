name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do we reproduce the issue?
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
